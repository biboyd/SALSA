name: Python application

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:

  build:

    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{matrix.python-version}}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Cache ion table
      id: cache-table
      uses: actions/cache@v5
      with:
        path: $HOME/.trident
        key: ${{ runner.os }}-ion-table

    - name: Download ion table
      if: steps.cache-table.outputs.cache-hit != 'true'
      run: |
        mkdir -p $HOME/.trident
        wget http://trident-project.org/data/ion_table/hm2012_ss_hr.h5.gz
        gunzip hm2012_ss_hr.h5.gz
        mv hm2012_ss_hr.h5 $HOME/.trident

    - name: Copy Trident config
      uses: canastro/copy-file-action@master
      with:
        source: ${GITHUB_WORKSPACE}/.github/scripts/config.tri
        target: $HOME/.trident/config.tri

    - name: Install salsa
      run: |
        pip install .

